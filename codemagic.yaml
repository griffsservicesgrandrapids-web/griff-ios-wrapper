workflows:
  ios-build:
    name: Build iOS
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: APIKey
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Install Capacitor CLI, reset iOS, and add fresh
        script: |
          npm install @capacitor/cli@latest --save-dev
          rm -rf ios/ || true
          npx cap add ios
          npx cap sync ios
      - name: Debug iOS project files
        script: |
          ls -la ios/App/
          ls ios/App/*.xcodeproj || echo "No .xcodeproj!"
          ls ios/App/*.xcworkspace || echo "No workspace yet!"
      - name: Build app
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            -archivePath ios/build/Archive.xcarchive \
            archive || xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            -archivePath ios/build/Archive.xcarchive \
            archive   # fallback to project if no workspace
    artifacts:
      - ios/build/Archive.xcarchive/**
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
