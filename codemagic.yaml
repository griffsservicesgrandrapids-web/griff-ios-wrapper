workflows:
  ios-build:
    name: Build iOS
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: APIKey
    scripts:
  - name: Install dependencies
    script: |
      npm ci
  - name: Build web assets
    script: |
      npm run build
  - name: Full iOS platform reset and setup
    script: |
      # Clean everything
      rm -rf ios/ || true
      rm -rf node_modules/@capacitor/ios || true
      npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/ios@latest --save-dev
      # Add platform fresh
      npx cap add ios
      # Sync (force copy assets and run pod install / SPM)
      npx cap sync ios --no-open
      # Explicit pod install (sometimes sync skips it)
      cd ios/App
      pod install --repo-update
      cd ../..
      # Double-check workspace exists
      ls ios/App/App.xcworkspace || echo "Workspace missing after sync!"
  - name: Build iOS app
    script: |
      xcodebuild -workspace ios/App/App.xcworkspace \
        -scheme App \
        -configuration Release \
        -sdk iphoneos \
        -derivedDataPath ios/build \
        -archivePath ios/build/Archive.xcarchive \
        archive
    artifacts:
      - ios/build/Archive.xcarchive/**
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
