workflows:
  ios-build:
    name: Build iOS
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: APIKey
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Install Capacitor CLI, reset iOS, and add fresh
        script: |
          npm install @capacitor/cli@latest --save-dev
          rm -rf ios/ || true
          npx cap add ios
          npx cap sync ios
      - name: Check SPM Package.swift exists
        script: |
          ls ios/App/Package.swift || (echo "Package.swift missing after add/sync"; exit 1)
      - name: Build app (SPM handles dependencies)
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -archivePath build/Archive.xcarchive \
            archive
    artifacts:
      - build/Archive.xcarchive/**
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
