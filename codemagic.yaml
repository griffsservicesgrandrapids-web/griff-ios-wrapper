workflows:
  ios-build:
    name: Build iOS
    instance_type: mac_mini_m1
    max_build_duration: 60
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Sync Capacitor platforms
        script: |
          npx cap sync ios
      - name: Check Podfile exists
        script: |
          ls ios/Podfile || (echo "Podfile missing after sync"; exit 1)
      - name: Install pods
        script: |
          cd ios/App
          pod install
      - name: Build app
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -archivePath build/Archive.xcarchive \
            archive
    artifacts:
      - build/Archive.xcarchive/**
    publishing:
      app_store_connect:
        auth: api_key
        submit_to_testflight: true
