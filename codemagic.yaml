workflows:
  ios-release:
    name: Gig Connect iOS Build
    max_build_duration: 60
    integrations:
      app_store_connect: APIKey
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.griff.gigconnect
    scripts:
      - npm ci
      - npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/ios@latest
      - npm run build
      - ls -la dist || echo "DIST EMPTY AFTER BUILD"
      - mkdir -p www && cp -r dist/* www/ || true
      - ls -la www || echo "WWW EMPTY AFTER COPY"
      - rm -rf ios || true
      - npx cap add ios
      - npx cap sync ios --verbose || echo "SYNC FAILED"
      - cd ios/App
      - pod install --repo-update
      - ls -la
      - cd ../../
      - ls -la ios/App/App.xcworkspace || (echo "WORKSPACE NOT FOUND"; exit 1)
      - xcode-project use-profiles
      - cd ios/App
      - xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -derivedDataPath build -archivePath build/App.xcarchive archive
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
