workflows:
  ios-release:
    name: Gig Connect iOS Build
    max_build_duration: 60
    integrations:
      app_store_connect: APIKey
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.griff.gigconnect
    scripts:
      - npm ci
      - npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/ios@latest
      - npm run build
      - mkdir -p www && cp -r dist/* www/ || true
      - ls -la www
      - rm -rf ios || true
      - npx cap add ios
      - npx cap sync ios
      - ls -la ios || echo "No ios folder!"
      - ls -la ios/App || echo "No App folder!"
      - ls -la ios/App/App.xcodeproj || echo "No App.xcodeproj!"
      - cd ios/App
      - ls -la
      - pod repo update || true
      - pod install --repo-update --project-directory=. --verbose || echo "Pod install failed"
      - cd ../../
      - xcode-project use-profiles
      - cd ios/App
      - xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -derivedDataPath build -archivePath build/App.xcarchive archive
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
