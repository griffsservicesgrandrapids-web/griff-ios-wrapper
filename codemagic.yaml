workflows:
  ios-release:
    name: Gig Connect iOS Build
    max_build_duration: 60
    integrations:
      app_store_connect: API Key  # Change if you named it different
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.griff.gigconnect  # match your capacitor.config.json
    scripts:
      - npm install
      - npx cap sync ios
      - cd ios/App && pod install
      - xcode-project use-profiles
      - |
        cd ios/App
        xcode-project build-ipa --workspace App.xcworkspace --scheme App
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true