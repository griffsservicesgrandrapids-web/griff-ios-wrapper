workflows:
  ios-build:
    name: Build iOS
    instance_type: mac_mini_m1
    max_build_duration: 120  # extra time for pods/sync
    integrations:
      app_store_connect: APIKey
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build web assets
        script: |
          npm run build
          ls -la dist/ || echo "ERROR: dist/ missing after build!"
      - name: Full iOS reset and sync
        script: |
          rm -rf ios/ node_modules/@capacitor/ios || true
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/ios@latest --save-dev
          npx cap add ios
          npx cap sync ios --no-open
          npx cap sync ios --no-open  # run twice for CI reliability
          cd ios/App
          pod deintegrate || true
          pod repo update || true
          pod install --repo-update
          cd ../..
          ls -la ios/App/App.xcworkspace || echo "ERROR: App.xcworkspace MISSING after sync!"
          ls -la ios/App/Pods || echo "Pods folder missing!"
      - name: Build iOS app
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            -archivePath ios/build/Archive.xcarchive \
            archive
    artifacts:
      - ios/build/Archive.xcarchive/**
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
