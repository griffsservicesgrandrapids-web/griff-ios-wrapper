workflows:
  ios-release:
    name: Gig Connect iOS Build
    max_build_duration: 60
    integrations:
      app_store_connect: APIKey
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.griff.gigconnect
    scripts:
      - npm ci
      - npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/ios@latest
      - npm run build  # <--- builds your web app (creates files in www/ or dist/)
      - mkdir -p www && cp -r dist/* www/ || true  # force copy build output to www/
      - ls -la www     # debug: confirm build output exists
      - rm -rf ios || true  # wipe old ios folder
      - npx cap add ios
      - npx cap sync ios
      - ls -la ios/App  # debug: should show Podfile now
      - cd ios/App && pod install
      - cd ../../
      - xcode-project use-profiles
      - cd ios/App
      - xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -derivedDataPath build -archivePath build/App.xcarchive archive
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    artifacts:
      - ios/App/build/ios/ipa/*.ipa