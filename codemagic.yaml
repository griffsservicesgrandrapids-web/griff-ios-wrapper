workflows:
  ios-build:
    name: Build iOS
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: APIKey
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build web assets
        script: |
          npm run build
      - name: Install Capacitor CLI and sync iOS
        script: |
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/ios@latest --save-dev
          rm -rf ios/ || true
          npx cap add ios
          npx cap sync ios
      - name: Build app
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            -archivePath ios/build/Archive.xcarchive \
            archive
    artifacts:
      - ios/build/Archive.xcarchive/**
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
