workflows:
  ios-release:
    name: Gig Connect iOS Build
    max_build_duration: 60
    integrations:
      app_store_connect: APIKey
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.griff.gigconnect
    scripts:
      - npm ci
      - npm run build   # <--- this builds your web app (assumes Vite/React/Angular—adjust if different)
      - npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/ios@latest
      - ls -la www      # debug: confirm files exist
      - rm -rf ios || true
      - npx cap add ios
      - npx cap sync ios
      - ls -la ios/App  # should now list Podfile + assets
      - cd ios/App && pod install
      - cd ../../
      - xcode-project use-profiles
      - cd ios/App
      - xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -derivedDataPath build -archivePath build/App.xcarchive archive
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    artifacts:
      - ios/App/build/ios/ipa/*.ipa