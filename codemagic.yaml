workflows:
  ios-release:
    name: Gig Connect iOS Build
    max_build_duration: 60
    integrations:
      app_store_connect: APIKey
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.griff.gigconnect
    scripts:
      scripts:
  - npm ci
  - npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/ios@latest
  - npm run build
  - mkdir -p www && cp -r dist/* www/ || true
  - ls -la www
  - rm -rf ios || true
  - npx cap add ios
  - npx cap sync ios
  - ls -la ios/App
  - |
    cd ios/App
    if [ ! -f Podfile ]; then
      echo "Manual Podfile creation"
      cat > Podfile << 'EOF'
platform :ios, 13.0
use_frameworks!

target 'App' do
  pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
  pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios/CapacitorCordova'
end

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
    end
  end
end
EOF
    fi
    pod repo update || true
    pod install --repo-update
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    artifacts:
      - ios/App/build/ios/ipa/*.ipa